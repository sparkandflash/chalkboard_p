<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  
  <meta name="description" content="{{.Description}}">
  <meta name="author" content="{{.Author}}">
  
  <!-- Open Graph -->
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{.Title}}">
  <meta property="og:description" content="{{.Description}}">
  <meta property="og:url" content="{{.SEOURL}}">
  <meta property="og:site_name" content="ChalkBoard">
  
  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{.Title}}">
  <meta name="twitter:description" content="{{.Description}}">
  
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      color: #333;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      background: #fdfdfd;
    }
    header {
      border-bottom: 1px solid #eaeaea;
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    .author {
      color: #666;
      font-style: italic;
    }
    pre {
      background: #f4f4f4;
      padding: 1.5rem;
      border-radius: 8px;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 0.95rem;
    }
    .cta {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 1.5rem;
      background: #000;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 500;
    }
    .cta:hover {
      background: #333;
    }
  </style>
</head>
<body>
  <header>
    <a href="https://chalkboard.cc" style="color: #000; font-weight: bold; text-decoration: none;">ChalkBoard</a>
  </header>
  
  <main>
    <h1>{{.RawTitle}}</h1>
    <p class="author">By {{.Author}}</p>
    
    <article>
      <pre>{{.Content}}</pre>
    </article>
    
    <a href="{{.AppURL}}" class="cta">View and interact with this prompt on ChalkBoard</a>
  </main>
</body>
</html>
